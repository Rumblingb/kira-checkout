<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kira — Self Checkout</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.184.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.184.0/examples/jsm/",
    "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@3.5.3/lib/three-vrm.module.js"
  }
}
</script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0b;
  --surface: #141416;
  --surface2: #1e1e22;
  --gold: #f7c948;
  --gold-dim: #c49a20;
  --text: #f0f0f0;
  --text-muted: #888;
  --red: #e05c5c;
  --green: #4eca7e;
  --border: rgba(255,255,255,0.07);
  --font: 'DM Sans', system-ui, sans-serif;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  overflow: hidden;
  user-select: none;
}

/* ──────────────────────────── START SCREEN ──────────────────────────── */
#start-screen {
  position: fixed; inset: 0; z-index: 100;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 32px;
  cursor: pointer;
  transition: opacity 0.6s;
}
#start-screen.hidden { opacity: 0; pointer-events: none; }

.start-logo {
  font-size: 72px; font-weight: 700;
  letter-spacing: -2px;
  color: var(--gold);
}
.start-sub {
  font-size: 22px; font-weight: 300;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
}
.start-tap {
  margin-top: 24px;
  padding: 20px 56px;
  border-radius: 16px;
  background: var(--gold);
  color: #000;
  font-size: 22px; font-weight: 600;
  letter-spacing: 0.5px;
  animation: pulse-tap 2s ease-in-out infinite;
}
@keyframes pulse-tap {
  0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(247,201,72,0.4); }
  50% { transform: scale(1.03); box-shadow: 0 0 0 18px rgba(247,201,72,0); }
}

/* ──────────────────────────── MAIN LAYOUT ──────────────────────────── */
#app {
  display: flex;
  width: 100vw; height: 100vh;
}

/* LEFT PANEL — character */
#character-panel {
  width: 40%;
  position: relative;
  background: linear-gradient(180deg, #0d0d10 0%, #0a0a0b 100%);
  display: flex; flex-direction: column;
  overflow: hidden;
}

#kira-canvas {
  width: 100%; height: 100%;
  display: block;
}

.kira-name-tag {
  position: absolute; bottom: 28px; left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 28px;
  font-size: 16px; font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
  white-space: nowrap;
}

/* speech bubble */
#speech-bubble {
  position: absolute; bottom: 80px; left: 12px; right: 12px;
  background: rgba(20,20,22,0.92);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(247,201,72,0.2);
  border-radius: 16px;
  padding: 14px 18px;
  font-size: 15px; line-height: 1.5;
  color: var(--text);
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
  min-height: 52px;
}
#speech-bubble.visible {
  opacity: 1; transform: translateY(0);
}

/* RIGHT PANEL — transaction */
#tx-panel {
  width: 60%;
  display: flex; flex-direction: column;
  background: var(--bg);
  border-left: 1px solid var(--border);
}

/* Camera section */
#camera-section {
  flex: 0 0 auto;
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
}

.section-label {
  font-size: 11px; font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
}

#camera-wrap {
  position: relative;
  width: 100%;
  height: 210px;
  border-radius: 14px;
  overflow: hidden;
  background: #0d0d10;
  border: 1.5px solid var(--border);
}
#camera-video {
  width: 100%; height: 100%;
  object-fit: cover;
}
#scan-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.scan-frame {
  width: 180px; height: 100px;
  border-radius: 8px;
  border: 2px solid var(--gold);
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.25);
  position: relative;
}
.scan-line {
  position: absolute;
  width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  animation: scan 1.8s ease-in-out infinite;
  top: 0;
}
@keyframes scan {
  0% { top: 0; opacity: 1; }
  100% { top: 100%; opacity: 0.3; }
}
.scan-status {
  position: absolute;
  bottom: 8px; left: 0; right: 0;
  text-align: center;
  font-size: 13px; font-weight: 500;
  color: var(--text-muted);
}
.scan-status.detected {
  color: var(--green);
  font-weight: 600;
}

/* Manual entry */
#manual-row {
  display: flex; gap: 10px;
  margin-top: 12px;
}
#barcode-input {
  flex: 1;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 16px;
  font-family: var(--font);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
#barcode-input:focus { border-color: var(--gold); }
#barcode-input::placeholder { color: var(--text-muted); }
#manual-btn {
  padding: 12px 20px;
  border-radius: 10px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  color: var(--text);
  font-size: 15px; font-weight: 500;
  cursor: pointer;
  transition: background 0.15s;
}
#manual-btn:hover { background: var(--gold); color: #000; }

/* Basket */
#basket-section {
  flex: 1;
  overflow-y: auto;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
}
#basket-section::-webkit-scrollbar { width: 4px; }
#basket-section::-webkit-scrollbar-track { background: transparent; }
#basket-section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

#basket-list {
  display: flex; flex-direction: column; gap: 8px;
}
.basket-empty {
  color: var(--text-muted);
  font-size: 15px;
  text-align: center;
  margin-top: 20px;
}
.basket-item {
  display: flex; align-items: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  gap: 12px;
  animation: slide-in 0.2s ease;
}
@keyframes slide-in {
  from { opacity: 0; transform: translateX(12px); }
  to { opacity: 1; transform: translateX(0); }
}
.basket-item-name {
  flex: 1;
  font-size: 16px; font-weight: 500;
}
.basket-item-price {
  font-size: 18px; font-weight: 600;
  color: var(--gold);
  min-width: 56px;
  text-align: right;
}
.basket-remove {
  background: none; border: none;
  color: var(--text-muted);
  font-size: 20px;
  cursor: pointer;
  padding: 0 4px;
  line-height: 1;
  transition: color 0.15s;
}
.basket-remove:hover { color: var(--red); }

/* Total + Pay */
#footer-section {
  flex: 0 0 auto;
  padding: 16px 24px 24px;
}
#total-row {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 16px;
}
#total-label {
  font-size: 18px; font-weight: 500;
  color: var(--text-muted);
}
#total-amount {
  font-size: 42px; font-weight: 700;
  color: var(--gold);
  letter-spacing: -1px;
}
#pay-btn {
  width: 100%;
  padding: 22px;
  border-radius: 16px;
  background: var(--gold);
  color: #000;
  font-size: 22px; font-weight: 700;
  font-family: var(--font);
  border: none;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.2s;
  letter-spacing: 0.5px;
}
#pay-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 32px rgba(247,201,72,0.35); }
#pay-btn:active { transform: translateY(0); }
#pay-btn:disabled { opacity: 0.4; cursor: default; transform: none; box-shadow: none; }

/* ──────────────────────────── PAYMENT OVERLAY ──────────────────────────── */
#payment-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.82);
  backdrop-filter: blur(12px);
  align-items: center; justify-content: center;
  flex-direction: column;
  gap: 28px;
}
#payment-overlay.visible { display: flex; }

.payment-title {
  font-size: 32px; font-weight: 700;
  text-align: center;
}
.tap-animation {
  width: 180px; height: 180px;
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.tap-ring {
  position: absolute;
  border-radius: 50%;
  border: 3px solid var(--gold);
  animation: tap-ripple 1.8s ease-out infinite;
}
.tap-ring:nth-child(1) { width: 80px; height: 80px; animation-delay: 0s; }
.tap-ring:nth-child(2) { width: 120px; height: 120px; animation-delay: 0.4s; }
.tap-ring:nth-child(3) { width: 160px; height: 160px; animation-delay: 0.8s; }
@keyframes tap-ripple {
  0% { opacity: 1; transform: scale(0.4); }
  100% { opacity: 0; transform: scale(1); }
}
.tap-icon {
  font-size: 52px;
  z-index: 1;
}
.payment-sub {
  font-size: 18px; color: var(--text-muted); text-align: center;
}
#simulate-btn {
  padding: 18px 48px;
  border-radius: 14px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  color: var(--text);
  font-size: 18px; font-weight: 500;
  font-family: var(--font);
  cursor: pointer;
  transition: background 0.15s;
}
#simulate-btn:hover { background: var(--green); color: #000; }
#cancel-payment-btn {
  background: none; border: none;
  color: var(--text-muted);
  font-size: 15px; cursor: pointer;
  font-family: var(--font);
  text-decoration: underline;
}

/* ──────────────────────────── DONE OVERLAY ──────────────────────────── */
#done-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.9);
  align-items: center; justify-content: center;
  flex-direction: column; gap: 24px;
}
#done-overlay.visible { display: flex; }
.done-check {
  font-size: 80px;
  animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes pop {
  0% { transform: scale(0); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.done-title {
  font-size: 36px; font-weight: 700;
  color: var(--green);
}
.done-sub {
  font-size: 20px; color: var(--text-muted);
}
#new-transaction-btn {
  margin-top: 16px;
  padding: 18px 48px;
  border-radius: 14px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  color: var(--text);
  font-size: 18px; font-weight: 500;
  font-family: var(--font);
  cursor: pointer;
}
#new-transaction-btn:hover { background: var(--gold); color: #000; }

/* VRM loading indicator */
#vrm-loading {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px;
  pointer-events: none;
}
#vrm-loading.hidden { display: none; }
.loading-spinner {
  width: 44px; height: 44px;
  border: 3px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: var(--text-muted); font-size: 14px; }
</style>
</head>
<body>

<!-- ── START SCREEN ── -->
<div id="start-screen">
  <div class="start-logo">Kira</div>
  <div class="start-sub">AI Checkout</div>
  <div class="start-tap">Tap to begin</div>
</div>

<!-- ── MAIN APP ── -->
<div id="app">

  <!-- LEFT: Character -->
  <div id="character-panel">
    <canvas id="kira-canvas"></canvas>
    <div id="vrm-loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading Kira...</div>
    </div>
    <div id="speech-bubble"></div>
    <div class="kira-name-tag">Kira</div>
  </div>

  <!-- RIGHT: Transaction -->
  <div id="tx-panel">

    <!-- Camera -->
    <div id="camera-section">
      <div class="section-label">Scan Item</div>
      <div id="camera-wrap">
        <video id="camera-video" autoplay playsinline muted></video>
        <div id="scan-overlay">
          <div class="scan-frame">
            <div class="scan-line"></div>
          </div>
        </div>
        <div id="scan-status" class="scan-status">Point barcode at camera</div>
      </div>
      <div id="manual-row">
        <input id="barcode-input" type="text" placeholder="Or type barcode / 'demo'" inputmode="numeric" />
        <button id="manual-btn">Add</button>
      </div>
    </div>

    <!-- Basket -->
    <div id="basket-section">
      <div class="section-label">Basket</div>
      <div id="basket-list">
        <div class="basket-empty" id="empty-msg">No items yet</div>
      </div>
    </div>

    <!-- Footer -->
    <div id="footer-section">
      <div id="total-row">
        <span id="total-label">Total</span>
        <span id="total-amount">£0.00</span>
      </div>
      <button id="pay-btn" disabled>Pay £0.00</button>
    </div>

  </div>
</div>

<!-- ── PAYMENT OVERLAY ── -->
<div id="payment-overlay">
  <div class="payment-title">Tap your card or phone</div>
  <div class="tap-animation">
    <div class="tap-ring"></div>
    <div class="tap-ring"></div>
    <div class="tap-ring"></div>
    <div class="tap-icon">📱</div>
  </div>
  <div class="payment-sub">Hold near the card reader</div>
  <button id="simulate-btn">Simulate Payment ✓</button>
  <button id="cancel-payment-btn">Cancel</button>
</div>

<!-- ── DONE OVERLAY ── -->
<div id="done-overlay">
  <div class="done-check">✓</div>
  <div class="done-title">Payment Complete</div>
  <div class="done-sub">Thanks for coming in!</div>
  <button id="new-transaction-btn">New Transaction</button>
</div>

<!-- ZXing for barcode scanning (UMD, non-module) -->
<script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

// ──────────────────────────────────────────────
// CONSTANTS
// ──────────────────────────────────────────────
const CARTESIA_KEY   = 'sk_car_pEhDNRCRydubEAsZQdHVC6';
const CARTESIA_VOICE = '694f9389-aac1-45b6-b726-9d9369183238';
const VRM_URL = 'https://raw.githubusercontent.com/pixiv/three-vrm/dev/packages/three-vrm/examples/models/VRM1_Constraint_Twist_Sample.vrm';

const products = {
  "5000169131428": { name: "Oat Flat White",          price: 4.20 },
  "5000169131435": { name: "Cappuccino",               price: 3.80 },
  "5000169000003": { name: "Almond Croissant",         price: 3.50 },
  "5000169000004": { name: "Banana",                   price: 0.40 },
  "5000169000005": { name: "Sparkling Water 500ml",    price: 1.80 },
  "5000169000006": { name: "Sandwich - Chicken Salad", price: 4.50 },
  "5000169000007": { name: "Chocolate Brownie",        price: 2.80 },
  "5000169000008": { name: "Orange Juice 330ml",       price: 2.20 },
  "demo":          { name: "Demo Item",                price: 1.00 },
};

// ──────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────
let basket     = [];
let audioCtx   = null;
let analyser   = null;
let lipSyncRAF = null;
let vrm        = null;
let vrmClock   = new THREE.Clock();
let blinkTimer = randomBlinkDelay();
let breathPhase = 0;
let lastScanned = null;
let scanCooldown = false;

// ──────────────────────────────────────────────
// DOM REFS
// ──────────────────────────────────────────────
const startScreen    = document.getElementById('start-screen');
const speechBubble   = document.getElementById('speech-bubble');
const basketList     = document.getElementById('basket-list');
const emptyMsg       = document.getElementById('empty-msg');
const totalAmount    = document.getElementById('total-amount');
const payBtn         = document.getElementById('pay-btn');
const scanStatus     = document.getElementById('scan-status');
const cameraVideo    = document.getElementById('camera-video');
const barcodeInput   = document.getElementById('barcode-input');
const manualBtn      = document.getElementById('manual-btn');
const paymentOverlay = document.getElementById('payment-overlay');
const simulateBtn    = document.getElementById('simulate-btn');
const cancelPayBtn   = document.getElementById('cancel-payment-btn');
const doneOverlay    = document.getElementById('done-overlay');
const newTxBtn       = document.getElementById('new-transaction-btn');
const vrmLoading     = document.getElementById('vrm-loading');

// ──────────────────────────────────────────────
// THREE.JS SETUP
// ──────────────────────────────────────────────
const canvas   = document.getElementById('kira-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x0d0d10);

const camera3d = new THREE.PerspectiveCamera(30, 1, 0.1, 100);
camera3d.position.set(0, 1.3, 3.5);
camera3d.lookAt(0, 1.1, 0);

// Lighting
const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);
const key = new THREE.DirectionalLight(0xfff4d0, 1.4);
key.position.set(1, 3, 3);
scene.add(key);
const fill = new THREE.DirectionalLight(0xd0e8ff, 0.4);
fill.position.set(-2, 1, 1);
scene.add(fill);
const rim = new THREE.DirectionalLight(0xffeebb, 0.5);
rim.position.set(0, 2, -3);
scene.add(rim);

function resizeRenderer() {
  const panel = document.getElementById('character-panel');
  const w = panel.clientWidth;
  const h = panel.clientHeight;
  renderer.setSize(w, h);
  camera3d.aspect = w / h;
  camera3d.updateProjectionMatrix();
}
resizeRenderer();
window.addEventListener('resize', resizeRenderer);

// ──────────────────────────────────────────────
// LOAD VRM
// ──────────────────────────────────────────────
const loader = new GLTFLoader();
loader.register(parser => new VRMLoaderPlugin(parser));

loader.load(
  VRM_URL,
  (gltf) => {
    vrm = gltf.userData.vrm;
    if (!vrm) { console.error('No VRM data found in GLTF'); return; }
    VRMUtils.removeUnnecessaryJoints(gltf.scene);
    scene.add(vrm.scene);
    // Center/position the character
    vrm.scene.position.set(0, 0, 0);
    vrmLoading.classList.add('hidden');
    startRenderLoop();
  },
  (progress) => {
    const pct = progress.total ? Math.round(progress.loaded / progress.total * 100) : '...';
    vrmLoading.querySelector('.loading-text').textContent = `Loading Kira... ${pct}%`;
  },
  (err) => {
    console.error('VRM load error:', err);
    vrmLoading.querySelector('.loading-text').textContent = 'Character unavailable';
    // Still start render loop so the rest of the demo works
    startRenderLoop();
  }
);

// ──────────────────────────────────────────────
// RENDER LOOP + VRM ANIMATIONS
// ──────────────────────────────────────────────
function randomBlinkDelay() {
  return 3 + Math.random() * 4; // 3-7 seconds
}

function startRenderLoop() {
  function tick() {
    requestAnimationFrame(tick);
    const delta = vrmClock.getDelta();

    if (vrm) {
      vrm.update(delta);

      // Breathing: subtle bobbing of the spine
      breathPhase += delta * 0.8;
      const breathY = Math.sin(breathPhase) * 0.006;
      const spineNode = vrm.humanoid?.getNormalizedBoneNode('spine');
      if (spineNode) {
        spineNode.rotation.z = breathY;
        spineNode.rotation.x = Math.sin(breathPhase * 0.5) * 0.004;
      }
      const chestNode = vrm.humanoid?.getNormalizedBoneNode('chest');
      if (chestNode) {
        chestNode.rotation.z = -breathY * 0.5;
      }

      // Blinking
      blinkTimer -= delta;
      if (blinkTimer <= 0) {
        doBlink();
        blinkTimer = randomBlinkDelay();
      }
    }

    renderer.render(scene, camera3d);
  }
  tick();
}

function doBlink() {
  if (!vrm?.expressionManager) return;
  const em = vrm.expressionManager;
  let t = 0;
  const blinkDuration = 0.12;
  const blinkClock = new THREE.Clock();

  function blinkFrame() {
    t = blinkClock.getElapsedTime();
    const v = t < blinkDuration / 2
      ? t / (blinkDuration / 2)
      : 1 - (t - blinkDuration / 2) / (blinkDuration / 2);
    const clamped = Math.max(0, Math.min(1, v));
    em.setValue('blink', clamped);
    if (t < blinkDuration) requestAnimationFrame(blinkFrame);
    else em.setValue('blink', 0);
  }
  blinkFrame();
}

// ──────────────────────────────────────────────
// LIP SYNC
// ──────────────────────────────────────────────
function animateLipSync(analyserNode, audioEl) {
  if (lipSyncRAF) cancelAnimationFrame(lipSyncRAF);
  const data = new Uint8Array(analyserNode.fftSize);

  function frame() {
    if (audioEl.paused || audioEl.ended) {
      setMouth(0);
      return;
    }
    analyserNode.getByteTimeDomainData(data);
    let sum = 0;
    for (let i = 0; i < data.length; i++) {
      const v = (data[i] - 128) / 128;
      sum += v * v;
    }
    const rms = Math.sqrt(sum / data.length);
    const mouthVal = Math.min(1, rms * 8);
    setMouth(mouthVal);
    lipSyncRAF = requestAnimationFrame(frame);
  }
  frame();
}

function setMouth(val) {
  if (!vrm?.expressionManager) return;
  vrm.expressionManager.setValue('aa', val);
}

// ──────────────────────────────────────────────
// AUDIO CONTEXT (single shared instance)
// ──────────────────────────────────────────────
function ensureAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// ──────────────────────────────────────────────
// TTS via Cartesia + Web Speech fallback
// ──────────────────────────────────────────────
let currentAudio = null;

async function speak(text) {
  // Update speech bubble
  showSpeechBubble(text);

  // Stop any current speech
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
    setMouth(0);
  }

  const ctx = ensureAudioCtx();

  try {
    const response = await fetch('https://api.cartesia.ai/tts/bytes', {
      method: 'POST',
      headers: {
        'Cartesia-Version': '2026-03-01',
        'Authorization': `Bearer ${CARTESIA_KEY}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        transcript: text,
        model_id: 'sonic-3-latest',
        voice: { mode: 'id', id: CARTESIA_VOICE },
        output_format: { container: 'mp3', encoding: 'mp3', sample_rate: 44100 }
      })
    });

    if (!response.ok) throw new Error(`Cartesia ${response.status}`);

    const audioBlob = await response.blob();
    const audioUrl  = URL.createObjectURL(audioBlob);
    const audio     = new Audio(audioUrl);

    const source   = ctx.createMediaElementSource(audio);
    const anNode   = ctx.createAnalyser();
    anNode.fftSize = 256;
    source.connect(anNode);
    anNode.connect(ctx.destination);

    currentAudio = audio;
    audio.play();
    animateLipSync(anNode, audio);

    audio.addEventListener('ended', () => {
      setMouth(0);
      setTimeout(hideSpeechBubble, 2000);
      URL.revokeObjectURL(audioUrl);
      currentAudio = null;
    });

  } catch (err) {
    console.warn('Cartesia TTS failed, using Web Speech:', err);
    speakFallback(text);
  }
}

function speakFallback(text) {
  if (!window.speechSynthesis) return;
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate  = 1.05;
  utt.pitch = 1.1;
  // pick a female-ish voice if available
  const voices = speechSynthesis.getVoices();
  const pref = voices.find(v => v.name.toLowerCase().includes('female') || v.name.includes('Samantha') || v.name.includes('Karen'));
  if (pref) utt.voice = pref;
  utt.onend = () => setTimeout(hideSpeechBubble, 2000);
  speechSynthesis.speak(utt);
}

function showSpeechBubble(text) {
  speechBubble.textContent = text;
  speechBubble.classList.add('visible');
}
function hideSpeechBubble() {
  speechBubble.classList.remove('visible');
}

// ──────────────────────────────────────────────
// BARCODE SCANNING via ZXing
// ──────────────────────────────────────────────
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    cameraVideo.srcObject = stream;

    const ZXing = window.ZXing;
    if (!ZXing) { console.warn('ZXing not loaded'); return; }

    const codeReader = new ZXing.BrowserMultiFormatReader();
    // decodeFromStream owns the stream; pass the pre-acquired stream + element
    codeReader.decodeFromStream(stream, cameraVideo, (result, err) => {
      if (result) {
        const code = result.getText();
        if (!scanCooldown && code !== lastScanned) {
          lastScanned = code;
          scanCooldown = true;
          setTimeout(() => { scanCooldown = false; lastScanned = null; }, 2500);
          handleBarcode(code);
        }
      }
    });

  } catch (err) {
    console.warn('Camera error:', err);
    scanStatus.textContent = 'Camera unavailable — use keyboard entry';
  }
}

function handleBarcode(code) {
  const product = products[code];
  scanStatus.textContent = `Scanned: ${code}`;
  scanStatus.classList.add('detected');
  setTimeout(() => {
    scanStatus.textContent = 'Point barcode at camera';
    scanStatus.classList.remove('detected');
  }, 2500);

  if (product) {
    addItem(product);
    speak(`Got it — ${product.name}, £${product.price.toFixed(2)}. Anything else?`);
  } else {
    speak("Hmm, I couldn't read that one — can you try again?");
  }
}

// ──────────────────────────────────────────────
// BASKET
// ──────────────────────────────────────────────
function addItem(product) {
  const item = { id: Date.now(), ...product };
  basket.push(item);
  renderBasket();
  updateTotal();
}

function removeItem(id) {
  basket = basket.filter(i => i.id !== id);
  renderBasket();
  updateTotal();
}

function renderBasket() {
  if (basket.length === 0) {
    basketList.innerHTML = '<div class="basket-empty" id="empty-msg">No items yet</div>';
    return;
  }
  basketList.innerHTML = basket.map(item => `
    <div class="basket-item" data-id="${item.id}">
      <span class="basket-item-name">${item.name}</span>
      <span class="basket-item-price">£${item.price.toFixed(2)}</span>
      <button class="basket-remove" data-id="${item.id}" title="Remove">✕</button>
    </div>
  `).join('');

  basketList.querySelectorAll('.basket-remove').forEach(btn => {
    btn.addEventListener('click', () => removeItem(Number(btn.dataset.id)));
  });
}

function updateTotal() {
  const total = basket.reduce((sum, i) => sum + i.price, 0);
  const fmt   = `£${total.toFixed(2)}`;
  totalAmount.textContent = fmt;
  payBtn.textContent      = `Pay ${fmt}`;
  payBtn.disabled         = basket.length === 0;
}

// ──────────────────────────────────────────────
// PAYMENT FLOW
// ──────────────────────────────────────────────
payBtn.addEventListener('click', () => {
  if (basket.length === 0) return;
  const total = basket.reduce((sum, i) => sum + i.price, 0);
  paymentOverlay.classList.add('visible');
  speak(`Great! Tap your card or phone on the reader when you're ready.`);
});

simulateBtn.addEventListener('click', () => {
  paymentOverlay.classList.remove('visible');
  basket = [];
  renderBasket();
  updateTotal();
  doneOverlay.classList.add('visible');
  speak("Paid! Thanks for coming in. See you next time!");
});

cancelPayBtn.addEventListener('click', () => {
  paymentOverlay.classList.remove('visible');
  hideSpeechBubble();
});

newTxBtn.addEventListener('click', () => {
  doneOverlay.classList.remove('visible');
  hideSpeechBubble();
});

// ──────────────────────────────────────────────
// MANUAL BARCODE ENTRY
// ──────────────────────────────────────────────
function handleManualEntry() {
  const val = barcodeInput.value.trim();
  if (!val) return;
  barcodeInput.value = '';
  handleBarcode(val);
}

manualBtn.addEventListener('click', handleManualEntry);
barcodeInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') handleManualEntry();
});

// ──────────────────────────────────────────────
// START SCREEN
// ──────────────────────────────────────────────
startScreen.addEventListener('click', async () => {
  startScreen.classList.add('hidden');

  // Unlock audio on first gesture
  ensureAudioCtx();

  // Start camera
  await startCamera();

  // Greeting
  setTimeout(() => {
    speak("Hey! I'm Kira. Ready to check out? Hold your first item up to the camera or tap to scan.");
  }, 600);
});

// Remove start screen from tab order until dismissed
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') {
    if (!startScreen.classList.contains('hidden')) {
      startScreen.click();
    }
  }
});
</script>
